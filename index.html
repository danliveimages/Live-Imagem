<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Pix - Live Imagem</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- FIGURINHAS -->
  <div class="floatingWrapper">

    <img src="nicfigurinha.png" class="floating">
    <img src="nicfigurinha.png" class="floating">
    <img src="nicfigurinha.png" class="floating">
    <img src="nicfigurinha.png" class="floating">
    <img src="nicfigurinha.png" class="floating">

  </div>

  <!-- CONTAINER -->
  <div class="container">

<div class="profileAvatar">

  <img
    src="perfil.png"
    alt="Perfil"
  >

</div>

    <!-- PROGRESSO -->
    <div class="progressWrapper">

      <div class="progressSteps">

        <div class="progressStep active"></div>

        <div class="progressLine"></div>

        <div
          class="progressStep"
          id="step2Ball"
        ></div>

      </div>

    </div>

    <!-- TÍTULO -->
    <h1 class="title">

      <span class="animatedTitle">
        Live Imagem Pix
      </span>

    </h1>

    <!-- =========================
         ETAPA 1
    ========================== -->

    <div
      class="page activePage"
      id="page1"
    >

      <!-- NICKNAME -->
      <input
        type="text"
        id="nickname"
        placeholder="Seu nickname"
        maxlength="20"
      >

      <!-- MENSAGEM -->
      <textarea
        id="message"
        placeholder="Mensagem (opcional)"
        maxlength="120"
      ></textarea>

      <!-- UPLOAD -->
      <label
        class="uploadLabel"
        for="image"
      >
        Escolher Foto 📷
      </label>

      <input
        type="file"
        id="image"
        accept="image/*"
      >

      <!-- ALERTA -->
      <div class="paymentAlert">

  <p>
    Sua imagem aparecerá na live após a confirmação do pagamento Pix
  </p>

  <p>
    Clique em continuar para efetuar o pagamento.
  </p>

  <p>
    Valor mínimo: R$1,00
  </p>

</div>

      <!-- CONTINUAR -->
      <button id="continueBtn">
        CONTINUAR
      </button>

    </div>

    <!-- =========================
         ETAPA 2
    ========================== -->

    <div
      class="page"
      id="page2"
    >

      <!-- QR -->
      <img
        src="danqrcode.png"
        class="pixImage"
      >

      <!-- DIVISOR -->
      <div class="divider">

        <div></div>

        <span>ou</span>

        <div></div>

      </div>

      <!-- TEXTO -->
      <p class="pixText">
        Copie a chave Pix:
      </p>

      <!-- CHAVE -->
      <div class="pixKey">
        d5d7dc22-155f-45ee-8e1f-cdc8433bd8b3
      </div>

      <!-- COPIAR -->
      <button id="copyBtn">
        COPIAR CHAVE PIX
      </button>

      <!-- CONFIRMAR -->
      <button id="sendBtn">
        CONFIRMAR PAGAMENTO
      </button>

      <!-- STATUS -->
      <p id="status"></p>

    </div>

  </div>

<div class="creditsCard">

  <a
    href="https://danliveimages.github.io/Site-LIP/#"
    target="_blank"
    class="creditsLink"
  >
    LiveImagemPix.com
  </a>

  <span class="creditsAuthor">
    by Daniel Lima
  </span>

</div>

  <script
    type="module"
    src="app.js"
  ></script>

</body>

</html>

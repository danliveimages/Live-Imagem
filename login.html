<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Login Admin</title>

<link
  href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
  rel="stylesheet"
>

<link
  rel="stylesheet"
  href="login.css"
>

</head>

<body>

<div class="loginWrapper">

  <div class="loginCard">

    <div class="logo">

      <div class="title">
        Live Imagem Pix
      </div>

      <div class="subtitle">
        Painel Administrativo
      </div>

    </div>

    <input
      id="email"
      type="email"
      placeholder="Email"
    >

    <input
      id="password"
      type="password"
      placeholder="Senha"
    >

    <button id="loginBtn">

      Entrar

    </button>

  </div>

</div>

<script
  type="module"
  src="login.js"
></script>

</body>
</html>

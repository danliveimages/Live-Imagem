<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Painel Admin</title>

  <!-- Poppins -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="admin.css?v=8">

</head>

<body>

<div class="adminApp">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- LOGO -->
    <div class="logo">

      <div class="adminTitle">
        ADM
      </div>

      <div class="liveImages">
        Live Imagem Pix
      </div>

    </div>

    <!-- BOTÃO FILA -->
    <button
      id="queueBtn"
      class="sidebarBtn queueBtn"
    >
      FILA
    </button>

    <!-- BOTÃO HISTÓRICO -->
    <button
      id="historyBtn"
      class="sidebarBtn historyBtn"
    >
      HISTÓRICO
    </button>

<button
  id="logoutBtn"
  class="sidebarBtn logoutBtn"
>
  SAIR
</button>

  </div>

  <!-- MAIN -->
<div class="mainContent">

  <!-- CONTROLES -->
  <div class="topControls">

    <!-- FILTRO -->
<div class="dateFilter">

  <button id="dateFilterBtn">

    <span id="selectedDate">
      Todos
    </span>

    <span id="filterArrow">
  ▼
</span>

  </button>

  <div id="dateFilterMenu" class="dateFilterMenu">

    <div
  id="dateFilterScroll"
  class="dateFilterScroll"
>

      <div class="dateOption" data-value="all">
        Todos
      </div>

    </div>

  </div>

</div> <!-- FALTAVA ESTE -->

<!-- LIMPAR HISTÓRICO -->
<button id="clearHistoryBtn">

      Limpar Histórico

    </button>

  </div>

  <!-- FILA -->
  <div
    id="list"
    class="contentSection activeSection"
  ></div>

  <!-- HISTÓRICO -->
  <div
    id="historyList"
    class="contentSection"
  ></div>

</div>

</div>

<script
  type="module"
  src="admin.js"
></script>

</body>

</html>
